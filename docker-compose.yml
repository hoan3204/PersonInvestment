version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - SA_PASSWORD=Abc@12345678
      - ACCEPT_EULA=Y
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql

  web:
    build:
      context: .
      dockerfile: PersonalInvestmentSystem.Web/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - db
    restart: unless-stopped
    command: sh -c "sleep 60 && dotnet PersonalInvestmentSystem.Web.dll"

volumes:
  sql-data: